<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenZen</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <nav class="sidebar">
            <div class="logo">OpenZen</div>
            <ul class="nav-links">
                <li class="active" onclick="showSection('focus', 'Focus', this)">Focus</li>
                <li onclick="showSection('todo', 'To-Do', this)">To-do</li>
                <li onclick="showSection('kanban', 'Kanban', this)">Kanban</li>
            </ul>
        </nav>



        

        
        
        <div class="main">
            <header class="header">
                <span class="page-title">Focus</span>
                <button class="theme-btn" onclick="toggleTheme()">☀</button>
            </header>

            <section class="section active" id="section-focus">
                <div class="presets">
                    <button class="preset-btn active-preset" onclick="setPreset(25, this)">25 min</button>
                    <button class="preset-btn" onclick="setPreset(15, this)">15 min</button>
                    <button class="preset-btn" onclick="setPreset(5, this)">5 min</button>
                </div>
                <div class="timer-circle">
                    <svg class="progress-ring" viewBox="0 0 220 220">
                        <circle class="ring-bg" cx="110" cy="110" r="100"/>
                        <circle class="ring-progress" cx="110" cy="110" r="100"/>
                    </svg>
                    <div class="circle-center">
                        <div class="timer-display">25:00</div>
                        <div class="timer-label">focus time</div>
                    </div>
                </div>

                <div class="timer-buttons">
                    <button class="btn-secondary" id="btn-reset" onclick="reset()">Reset</button>
                    <button class="btn-primary" id="btn-start" onclick="startPause()">Start</button>
                    <button class="btn-secondary" id="btn-skip" onclick="skip()">Skip</button>
                </div>
            </section>

            <section class="section" id="section-todo">
                <p>To-Do coming soon!</p>
            </section>
            <section class="section" id="section-kanban">
                <p>Kanban is coming soon!</p>
            </section>

        </div>


    </div>

    <script src="script.js"></script>
</body>

</html>
