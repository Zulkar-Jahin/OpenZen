<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenZen</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <nav class="sidebar">
            <div class="logo">OpenZen</div>
            <ul class="nav-links">
                <li class="active">Focus</li>
                <li>To-do</li>
                <li>Kanban</li>
            </ul>
        </nav>



        

        
        
        <div class="main">
            <header class="header">
                <span class="page-title">Focus</span>
                <button class="theme-btn">☀</button>
            </header>

            <section class="section" id="section-focus">
                <div class="timer-circle">
                    <div class="timer-display">25:00</div>
                    <div class="timer-lebel">focus time</div>
                </div>

                <div class="timer-buttons">
                    <button class="btn-secondary" onclick="reset()">Reset</button>
                    <button class="btn-primary" onclick="startPause()">Start</button>
                    <button class="btn-secondary">Skip</button>
                </div>
            </section>


        </div>


    </div>

    <script src="script.js"></script>
</body>

</html>
